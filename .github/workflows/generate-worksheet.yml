name: Generate Worksheet

on:
  schedule:
    - cron: "0 14 */2 * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Railway service
        run: |
          echo "Waiting for service to be ready..."
          for i in $(seq 1 24); do
            STATUS=$(curl --silent -o /dev/null -w "%{http_code}" "${{ secrets.API_BASE_URL }}/")
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 401 ] || [ "$STATUS" -eq 403 ]; then
              echo "Service is up (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i: got $STATUS, waiting..."
            sleep 5
          done

      - name: Wait for Redis and RQ worker
        run: |
          echo "Waiting for Redis connection and RQ worker..."
          STATUS=""
          for i in $(seq 1 24); do
            STATUS=$(curl --silent -o /dev/null -w "%{http_code}" "${{ secrets.API_BASE_URL }}/health/")
            if [ "$STATUS" = "200" ]; then
              echo "Redis and worker are ready (HTTP $STATUS)"
              curl --silent "${{ secrets.API_BASE_URL }}/health/"
              echo
              break
            fi
            echo "Attempt $i: health returned ${STATUS:-unknown}, waiting..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "Redis or RQ worker failed to become ready (last HTTP: ${STATUS:-none})."
            echo "Last /health/ JSON:"
            curl --silent "${{ secrets.API_BASE_URL }}/health/" || true
            echo
            exit 1
          fi

      - name: Request token with retries
        id: get_token
        run: |
          MAX_RETRIES=4
          RETRY_DELAY=15

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i to obtain token..."

            RESPONSE=$(curl --silent -X POST "${{ secrets.API_BASE_URL }}/api/token/" \
              -H "Content-Type: application/json" \
              -d "{\"username\": \"${{ secrets.API_USERNAME }}\", \"password\": \"${{ secrets.API_PASSWORD }}\"}")

            TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty' | tr -d '\n\r')

            if [ -n "$TOKEN" ]; then
              echo "Token acquired."
              echo "::add-mask::$TOKEN"
              echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "No token yet. Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          done

          echo "Failed to obtain token after $MAX_RETRIES attempts."
          exit 1

      - name: Call generate worksheet endpoint
        run: |
          TOKEN="${{ steps.get_token.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Token is empty!"
            exit 1
          fi
          echo "Calling generate worksheet endpoint..."
          curl --fail --show-error -X POST \
            "${{ secrets.API_BASE_URL }}/api/worksheet/generate-worksheet/" \
            -H "Authorization: Token $TOKEN"